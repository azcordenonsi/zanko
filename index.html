<audio id="rainAudio" loop preload="auto">
   <source src="audio/chuva.ogg" type="audio/ogg">
  Seu navegador não suporta áudio.
</audio>



<script>
  const rainAudio = document.getElementById("rainAudio");
  const audioToggle = document.getElementById("audioToggle");

  let audioStarted = false;
  let fadeInterval = null;

  function updateAudioButton() {
    audioToggle.textContent = rainAudio.paused ? "ÁUDIO: OFF" : "ÁUDIO: ON";
  }

  function fadeInAudio(target = 0.22, duration = 2500) {
    clearInterval(fadeInterval);

    rainAudio.volume = 0;
    const steps = 30;
    const stepTime = duration / steps;
    const increment = target / steps;

    fadeInterval = setInterval(() => {
      if (rainAudio.volume + increment >= target) {
        rainAudio.volume = target;
        clearInterval(fadeInterval);
      } else {
        rainAudio.volume = Math.min(rainAudio.volume + increment, target);
      }
    }, stepTime);
  }

  async function startRain() {
    try {
      await rainAudio.play();
      if (!audioStarted) {
        fadeInAudio(0.20, 2200);
        audioStarted = true;
      }
      updateAudioButton();
    } catch (err) {
      updateAudioButton();
    }
  }

  function stopRain() {
    rainAudio.pause();
    updateAudioButton();
  }

  window.addEventListener("load", () => {
    startRain();
  });

  document.addEventListener("click", () => {
    if (!audioStarted && rainAudio.paused) {
      startRain();
    }
  }, { once: true });

  audioToggle.addEventListener("click", (e) => {
    e.stopPropagation();

    if (rainAudio.paused) {
      startRain();
    } else {
      stopRain();
    }
  });

  updateAudioButton();
</script>

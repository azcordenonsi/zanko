<audio id="pageFlipAudio" preload="auto">
  <source src="audio/pageFlip.mp3" type="audio/mpeg">
</audio>

<script type="module" src="jornaisRevistas.js"></script>


<script>
const pageFlipAudio = document.getElementById("pageFlipAudio");

/* FUNÇÃO REUTILIZÁVEL PARA VIRAR PÁGINA */
function playPageFlip(volume = 0.45) {
  if (!pageFlipAudio) return;

  try {
    pageFlipAudio.pause();
    pageFlipAudio.currentTime = 0;
    pageFlipAudio.volume = volume;
    pageFlipAudio.play().catch(() => {});
  } catch (err) {
    // silencioso
  }
}

/* FUNÇÃO AUXILIAR: associa o som a vários botões */
function bindPageFlip(selector, volume = 0.45) {
  document.querySelectorAll(selector).forEach((element) => {
    element.addEventListener("click", () => {
      playPageFlip(volume);
    });
  });
}

bindPageFlip("#btnJR-prev");
bindPageFlip("#btnJR-next");
bindPageFlip("#btn-fecharJR");
</script>
</body>

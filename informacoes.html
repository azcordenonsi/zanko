<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspetor Zanko</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">


</head>
<body>
  <main class="page">
    <div id="escala">
    <div class="scene-wrapper">
      <section class="sceneInformacoes">
	    <a href="index.html" class="ui-button btn-voltar">VOLTAR</a>
		<div id = "informacoesLayer" class="informacoes-layer"></div>

		<div class="lamp-glow-informacoes lamp-informacoes"></div>
		<button id="audioToggle" class="audio-toggle btn-audio">ÁUDIO: OFF</button>
	</section>
    </div>
	</div>
  </main>
<audio id="luzAudio" loop preload="auto">
  <source src="audio/luzIncandescente.ogg" type="audio/ogg">
  Seu navegador não suporta áudio.
</audio>



<script>
  const luzAudio = document.getElementById("luzAudio");

  const audioToggle = document.getElementById("audioToggle");

  let audioStarted = false;
  let fadeInterval = null;

  function updateAudioButton() {
    audioToggle.textContent = luzAudio.paused ? "ÁUDIO: OFF" : "ÁUDIO: ON";
  }

  function fadeInAudio(target = 0.22, duration = 2500) {
    clearInterval(fadeInterval);

    luzAudio.volume = 0;
    const steps = 30;
    const stepTime = duration / steps;
    const increment = target / steps;

    fadeInterval = setInterval(() => {
      if (luzAudio.volume + increment >= target) {
        luzAudio.volume = target;
        clearInterval(fadeInterval);
      } else {
		luzAudio.volume = Math.min(luzAudio.volume + increment, target);
      }
    }, stepTime);
  }

  async function startLight() {
    try {
      await luzAudio.play();
      if (!audioStarted) {
        fadeInAudio(0.20, 2200);
        audioStarted = true;
      }
      updateAudioButton();
    } catch (err) {
      updateAudioButton();
    }
  }

  function stopLight() {
	luzAudio.pause();
    updateAudioButton();
  }

  window.addEventListener("load", () => {
	startLight();
  });

  document.addEventListener("click", () => {
    if (!audioStarted && luzAudio.paused) {
      startLight();
    }
  }, { once: true });

  audioToggle.addEventListener("click", (e) => {
    e.stopPropagation();

    if (luzAudio.paused) {
      startLight();
    } else {
      stopLight();
    }
  });

  updateAudioButton();

</script>
</body>

</html>
